<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Min Radiostation</title>
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .player-box { background: #181818; padding: 30px; border-radius: 20px; text-align: center; width: 350px; }
        #spotifyPlayer { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="player-box">
        <h2 id="status">Velkommen</h2>
        <audio id="audioPlayer" controls style="width: 100%;"></audio>
        
        <div id="spotifyPlayer">
            <iframe id="spotifyIframe" src="" width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
    </div>

    <script>
        // Her er rækkefølgen defineret
        const playlist = [
            { type: 'mp3', src: 'speak_1.mp3' },
            { type: 'spotify', src: 'https://open.spotify.com/embed/track/2cfmjFK51sBubowSigw5f8?utm_source=generator' },
            { type: 'mp3', src: 'speak_2.mp3' },
            { type: 'spotify', src: 'https://open.spotify.com/embed/track/1PMIoBJ52Ii6uRmvKeHVCY?utm_source=generator' },
            { type: 'mp3', src: 'speak_3.mp3' },
            { type: 'spotify', src: 'https://open.spotify.com/embed/track/3YccWppckhAki39U29Eyrv?utm_source=generator' },
            { type: 'mp3', src: 'speak_4.mp3' }
        ];

        let index = 0;
        const audio = document.getElementById('audioPlayer');
        const spotifyDiv = document.getElementById('spotifyPlayer');
        const spotifyIframe = document.getElementById('spotifyIframe');
        const status = document.getElementById('status');

        function playNext() {
            if (index >= playlist.length) {
                status.innerText = "Programmet er slut!";
                return;
            }

            let item = playlist[index];
            status.innerText = "Nu spiller: " + (item.type === 'mp3' ? "Speak " + (index/2 + 1) : "Musik");

            if (item.type === 'mp3') {
                spotifyDiv.style.display = 'none';
                audio.style.display = 'block';
                audio.src = item.src;
                audio.play();
            } else {
                audio.style.display = 'none';
                spotifyDiv.style.display = 'block';
                spotifyIframe.src = item.src;
            }
            index++;
        }

        // Når mp3 er slut, gå automatisk til næste
        audio.onended = playNext;

        // Kickstart radioen
        playNext();
    </script>
</body>
</html>

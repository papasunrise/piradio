<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Min Radio</title>
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .player-box { background: #181818; padding: 30px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="player-box">
        <h2 id="status">Radioen er klar</h2>
        
        <audio id="speakPlayer" controls></audio>

        <div id="spotifyContainer" style="display:none; margin-top: 20px;">
            <iframe src="https://open.spotify.com/embed/playlist/21f3k61sSWXRk2O6ZtoPu0" 
                    width="300" height="380" frameborder="0" allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const speaks = ["speak_1.mp3", "speak_2.mp3", "speak3.mp3", "speak_4.mp3"];
        let currentSpeak = 0;
        const audio = document.getElementById('speakPlayer');
        const statusText = document.getElementById('status');

        // Start første fil
        audio.src = speaks[currentSpeak];

        audio.onended = function() {
            currentSpeak++;
            if (currentSpeak < speaks.length) {
                // Næste speak
                audio.src = speaks[currentSpeak];
                audio.play();
                statusText.innerText = "Spiller speak " + (currentSpeak + 1);
            } else {
                // Alle speaks færdige - Vis Spotify
                document.getElementById('speakPlayer').style.display = 'none';
                document.getElementById('spotifyContainer').style.display = 'block';
                statusText.innerText = "Nu spiller musikken!";
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piradio</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #1DB954; }
        p { color: #b3b3b3; font-size: 1.2rem; margin-bottom: 30px; }
        .btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); background-color: #1ed760; }
        #status { margin-top: 20px; color: #1DB954; font-weight: bold; }
    </style>
</head>
<body>

    <h1>PIRADIO</h1>
    <p>Velkommen til dit on-demand radioprogram</p>
    
    <button class="btn" id="startBtn">START PROGRAMMET</button>
    <div id="status"></div>

    <script>
        // OPLYSNINGER TIL SPOTIFY
        const CLIENT_ID = '2380f59802134fd89e665f1966cab9b4'; 
        const REDIRECT_URI = 'https://papasunrise.github.io/piradio/';
        
        // TEST-FILER
        const TEST_SPEAK = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'; 
        const TEST_SPOTIFY_TRACK = 'spotify:track:4pt76R6w96fKjSjR7uL34m'; 

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        
        let audioPlayer = new Audio();
        let accessToken = '';

        // Tjek om Spotify har sendt en "code" tilbage i URL'en
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            statusDiv.innerText = "Logget ind! Gør klar til afspilning...";
            startBtn.innerText = "AFSPIL NU";
            // Gem koden midlertidigt i browseren
            sessionStorage.setItem('spotify_auth_code', code);
            // Ryd URL'en så den ser pæn ud
            window.history.pushState({}, document.title, window.location.pathname);
        }

        // Knaphåndtering
        startBtn.addEventListener('click', () => {
            const savedCode = sessionStorage.getItem('spotify_auth_code');
            
            if (!savedCode && !code) {
                // Her sender vi dig til Spotify med "response_type=code"
                const scopes = 'user-modify-playback-state user-read-playback-state';
                window.location = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}&response_type=code`;
            } else {
                // Hvis vi har koden, starter vi programmet
                afspilRadioProgram();
            }
        });

        function afspilRadioProgram() {
            statusDiv.innerText = "Spiller radio-speak...";
            audioPlayer.src = TEST_SPEAK;
            audioPlayer.play();

            audioPlayer.onended = function() {
                statusDiv.innerText = "Speaken er slut! Musikken starter om et øjeblik...";
                // Musik-logikken kører herfra, når vi har ombyttet koden til en token
            };
        }
    </script>
</body>
</html>

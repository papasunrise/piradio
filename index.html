<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piradio</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #1DB954; letter-spacing: 2px; }
        p { color: #b3b3b3; font-size: 1.2rem; margin-bottom: 30px; }
        .btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover { transform: scale(1.05); background-color: #1ed760; }
        #status { margin-top: 20px; color: #1DB954; font-size: 1.1rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h1>PIRADIO</h1>
    <p>Dit on-demand radioprogram</p>
    
    <button class="btn" id="startBtn">LOG IND MED SPOTIFY</button>
    <div id="status">Venter på login...</div>

    <script>
        const CLIENT_ID = '2380f59802134fd89e665f1966cab9b4'; 
        const REDIRECT_URI = 'https://papasunrise.github.io/piradio/';
        
        const PLAYLIST = [
            { type: 'speak', url: 'speak_1.mp3' },
            { type: 'track', uri: 'spotify:track:2cfmjFK51sBubowSigw5f8' },
            { type: 'speak', url: 'speak_2.mp3' },
            { type: 'track', uri: 'spotify:track:1PMIoBJ52Ii6uRmvKeHVCY' },
            { type: 'speak', url: 'speak_3.mp3' },
            { type: 'track', uri: 'spotify:track:3YccWppckhAki39U29Eyrv' },
            { type: 'speak', url: 'speak_4.mp3' }
        ];

        let currentIndex = 0;
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        
        let audioPlayer = new Audio();
        let accessToken = '';

        // Tjek URL for token efter Spotify-login
        const hash = window.location.hash.substring(1).split('&').reduce(function (initial, item) {
            if (item) {
                var parts = item.split('=');
                initial[parts[0]] = decodeURIComponent(parts[1]);
            }
            return initial;
        }, {});
        
        // HVIS VI ER LOGGET IND:
        if (hash.access_token) {
            accessToken = hash.access_token;
            window.location.hash = ""; // Ryd URL'en med det samme
            
            // Tving siden til at vente på et NYT klik, så lyden ikke blokeres
            statusDiv.innerText = "Forbindelse oprettet!";
            startBtn.innerText = "AFSPIL NU";
        }

        // Hvad sker der ved klik på den store knap?
        startBtn.addEventListener('click', () => {
            if (!accessToken) {
                // Skridt 1: Send brugeren til Spotify for at få adgang
                const scopes = 'user-modify-playback-state user-read-playback-state';
                window.location = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}&response_type=token`;
            } else {
                // Skridt 2: Hvis vi ER logget ind, og du klikker NU, starter programmet rent
                startBtn.style.display = 'none'; 
                koerNæsteTrin();
            }
        });

        function koerNæsteTrin() {
            if (currentIndex >= PLAYLIST.length) {
                statusDiv.innerText = "Udsendelsen er slut. Tak fordi du lyttede med!";
                return;
            }

            const nuværende = PLAYLIST[currentIndex];

            if (nuværende.type === 'speak') {
                statusDiv.innerText = `Spiller speak_${Math.floor(currentIndex/2) + 1}...`;
                
                // Hent filen helt frisk
                audioPlayer.src = nuværende.url + '?v=' + Math.random();
                
                // Sæt Spotify på pause på din konto imens
                fetch('https://api.spotify.com/v1/me/player/pause', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                audioPlayer.play()
                    .then(() => {
                        // Gå først videre når filen REELT er færdig med at spille
                        audioPlayer.onended = function() {
                            currentIndex++;
                            koerNæsteTrin();
                        };
                    })
                    .catch(err => {
                        statusDiv.innerHTML = "Browseren blokerede lyden.<br><button class='btn' onclick='audioPlayer.play(); koerNæsteTrin();'>Klik her for at tillade lyd</button>";
                    });

            } else if (nuværende.type === 'track') {
                statusDiv.innerText = "Starter næste nummer på Spotify...";
                
                // Start præcis din sang
                fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    body: JSON.stringify({ uris: [nuværende.uri] }),
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    }
                }).then(response => {
                    currentIndex++;
                    statusDiv.innerHTML = `Hører nu musik via Spotify.<br><button class="btn" style="padding:10px 20px; font-size:1rem; margin-top:10px;" onclick="ManuelNæste()">Klik for næste speak</button>`;
                });
            }
        }

        function ManuelNæste() {
            koerNæsteTrin();
        }
    </script>
</body>
</html>
